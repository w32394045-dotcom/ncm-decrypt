name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ''
          - os: linux
            arch: arm64
            ext: ''
          - os: darwin
            arch: amd64
            ext: ''
          - os: darwin
            arch: arm64
            ext: ''
          - os: windows
            arch: amd64
            ext: .exe
          - os: windows
            arch: arm64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: |
          TAG=${GITHUB_REF_NAME}
          BINARY="ncm-decrypt-${TAG}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 \
            go build -ldflags="-s -w" -o "release/${BINARY}" .
          echo "binary=${BINARY}" >> $GITHUB_OUTPUT
        id: build

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: release/${{ steps.build.outputs.binary }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect binaries
        run: |
          mkdir -p release
          find release-artifacts -type f -exec cp {} release/ \;
          cd release
          sha256sum ncm-decrypt-* > checksums.txt
          ls -lh

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
